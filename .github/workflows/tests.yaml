name: Build and run tests
on: [push, pull_request]

jobs:
  linux-docker:
    strategy:
      fail-fast: false
      matrix:
        os: [centos7, ubuntu22.04]
    runs-on: [ubuntu-24.04]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: |
          cp Dockerfile.${{ matrix.os }} Dockerfile
          docker build --tag sta-${{ matrix.os }} .
      - run: |
          docker run --entrypoint /bin/bash --tty --rm sta-${{ matrix.os }} -c "cd /OpenSTA/test && (./regression || (cat results/diffs && exit 1)) || (./regression -collections || (cat results/diffs && exit 1))"

  macos:
    runs-on: [macos-14]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: brew bundle
      - run: |
          eval "$(/opt/homebrew/bin/brew shellenv)"
          export PATH="$(brew --prefix flex)/bin:$PATH"
          export PATH="$(brew --prefix bison)/bin:$PATH"
          export TCL_LIBRARY="$(brew --prefix tcl-tk@8)/lib/libtcl8.6.dylib"
          export TCL_INCLUDE_PATH="$(brew --prefix tcl-tk@8)/include/tcl-tk"
          export FLEX_INCLUDE_DIR="$(brew --prefix flex)/include"
          cmake -S . -B build -D TCL_LIBRARY=$TCL_LIBRARY \
                              -D TCL_INCLUDE_PATH=$TCL_INCLUDE_PATH \
                              -D FLEX_INCLUDE_DIR=$FLEX_INCLUDE_DIR
          cd build
          make -j`sysctl -n hw.ncpu`
      - run: |
          echo "=== TCL Object Representation Debug ==="
          ./build/app/sta -no_splash -exit <<'EOF'
          read_liberty test/asap7_invbuf.lib.gz
          read_verilog test/vcd_timestamp.v  
          link_design top
          create_clock -name vclk -period 10
          read_vcd test/vcd_timestamp.vcd -scope top
          set pin [lindex [get_pins -hierarchical *] 0]
          set prop [pin_property $pin activity]
          puts "Result: $prop"
          puts "Type info: [tcl::unsupported::representation $prop]"
          puts "llength: [llength $prop]"
          puts "lindex 0: [lindex $prop 0]"
          EOF
      - run: |
          cd test
          ./regression || (cat results/diffs && exit 1)
          ./regression -collections || (cat results/diffs && exit 1)
